# ライフサイクルフックの使用例を示す設定ファイル
tools:
  - name: kubernetes
    command:
      - kubectl
    beforeExec: |
      #!/bin/bash
      echo "=== Kubernetes Operation Start ==="
      echo "Current context: $(kubectl config current-context)"
      echo "Current namespace: {{.namespace}}"
    afterExec: |
      #!/bin/bash
      echo "=== Kubernetes Operation Complete ==="
      echo "Operation completed at $(date)"
    params:
      namespace:
        description: Target Kubernetes namespace
        type: string
        required: true
    subtools:
      - name: deploy
        args: ["apply", "-f", "{{.manifest}}", "-n", "{{.namespace}}"]
        beforeExec: |
          #!/bin/bash
          echo "Validating manifest..."
          kubectl diff -f {{.manifest}} -n {{.namespace}} || true
          echo "Checking namespace resources..."
          kubectl get all -n {{.namespace}}
        afterExec: |
          #!/bin/bash
          echo "Checking deployment status..."
          kubectl get pods -n {{.namespace}}
          echo "Checking service endpoints..."
          kubectl get endpoints -n {{.namespace}}
        params:
          manifest:
            description: Kubernetes manifest file
            type: string
            required: true
        danger_level: medium

  - name: database
    command:
      - mysql
    beforeExec: |
      #!/bin/bash
      echo "=== Database Operation Start ==="
      echo "Checking database connection..."
      mysql -h {{.host}} -u {{.user}} -p{{.password}} -e "SELECT 1;" > /dev/null
    afterExec: |
      #!/bin/bash
      echo "=== Database Operation Complete ==="
      echo "Operation completed at $(date)"
    params:
      host:
        description: Database host
        type: string
        required: true
      user:
        description: Database user
        type: string
        required: true
      password:
        description: Database password
        type: string
        required: true
    subtools:
      - name: backup
        args: ["-h", "{{.host}}", "-u", "{{.user}}", "-p{{.password}}", "{{.database}}", "-e", "source {{.backup_script}}"]
        beforeExec: |
          #!/bin/bash
          echo "Preparing for database backup..."
          echo "Target database: {{.database}}"
          echo "Checking available disk space..."
          df -h /backup
        afterExec: |
          #!/bin/bash
          echo "Verifying backup..."
          ls -lh "/backup/{{.database}}_$(date +%Y%m%d).sql"
          echo "Backup size: $(du -h /backup/{{.database}}_$(date +%Y%m%d).sql | cut -f1)"
        params:
          database:
            description: Database name to backup
            type: string
            required: true
          backup_script:
            description: Backup script path
            type: string
            required: true
        danger_level: high

# 使用例:
# operations kubernetes_deploy --namespace production --manifest deployment.yaml
# operations database_backup --host db.example.com --user admin --password secret --database myapp --backup_script backup.sql 