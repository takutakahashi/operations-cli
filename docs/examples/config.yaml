actions:
  - danger_level: high
    type: confirm
    message: "This is a high danger operation. Proceed? (y/n): "
  - danger_level: medium
    type: timeout
    message: "This is a medium danger operation. Proceeding in 5 seconds."
    timeout: 5
  - danger_level: low
    type: force
    message: "This is a low danger operation."

tools:
  - name: kubectl
    command:
      - kubectl
    params:
      namespace:
        description: The namespace to run the command in
        type: string
        required: true
        validate:
          - danger_level: high
            exclude:
              - kube-system
              - kube-public
              - default
    subtools:
      - name: get pod
        args: ["get", "pod", "-o", "json", "-n", "{{.namespace}}"]
      - name: describe pod
        params:
          pod:
            description: The pod to describe
            type: string
            required: true
        args: ["describe", "pod", "{{.pod}}", "-n", "{{.namespace}}"]
      - name: delete pod
        danger_level: high
        params:
          pod:
            description: The pod to delete
            type: string
            required: true
        args: ["delete", "pod", "{{.pod}}", "-n", "{{.namespace}}"]

  # シェルスクリプトを使用したツール例
  - name: script-example
    script: |
      #!/bin/bash
      echo "Running a shell script with parameter: {{.param1}}"
      echo "Current date: $(date)"
      echo "Directory listing:"
      ls -la
    params:
      param1:
        description: A sample parameter for the script
        type: string
        required: true
    subtools:
      - name: complex
        script: |
          #!/bin/bash
          echo "Running a complex script operation"
          echo "Parameter value: {{.param1}}"
          echo "Creating a temporary file..."
          TMPFILE=$(mktemp)
          echo "Temporary file created at: $TMPFILE"
          echo "Writing data to file..."
          echo "{{.param1}}" > $TMPFILE
          echo "File content:"
          cat $TMPFILE
          echo "Removing temporary file..."
          rm -f $TMPFILE
          echo "Operation complete."
  
  - name: echo
    command:
      - echo
    params:
      message:
        description: The message to echo
        type: string
        required: true
    subtools:
      - name: hello
        args: ["Hello, {{.message}}!"]
      - name: goodbye
        args: ["Goodbye, {{.message}}!"]