actions:
  - danger_level: low
    type: confirm
    message: "This is a low-risk operation. Proceed?"
  - danger_level: medium
    type: confirm
    message: "This is a medium-risk operation. Are you sure you want to proceed?"
  - danger_level: high
    type: confirm
    message: "This is a high-risk operation. Please confirm carefully before proceeding."

tools:
  - name: remote-echo
    command:
      - echo
    subtools:
      - name: hello
        params:
          message:
            description: Message to echo
            type: string
            required: false
            default: "world"
        args: ["Remote Hello, {{.message}}!"]
      - name: goodbye
        params:
          message:
            description: Message to echo
            type: string
            required: false
            default: "world"
        args: ["Remote Goodbye, {{.message}}!"]
  
  - name: remote-sleep
    command:
      - sleep
    subtools:
      - name: short
        args: ["1"]
        danger_level: low
      - name: medium
        args: ["2"]
        danger_level: medium
      - name: long
        params:
          seconds:
            description: Number of seconds to sleep
            type: string
            required: false
            default: "5"
        args: ["{{.seconds}}"]
        danger_level: high