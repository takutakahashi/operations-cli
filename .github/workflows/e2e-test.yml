name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  e2e-test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    services:
      ssh-server:
        image: linuxserver/openssh-server:latest
        ports:
          - 2222:2222
        env:
          USER_NAME: testuser
          USER_PASSWORD: testpassword
          PASSWORD_ACCESS: 'true'
          SUDO_ACCESS: 'true'
          
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build application
        run: make build

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Verify SSH server is running
        run: |
          # Wait for SSH server to be ready
          sleep 5
          # Test SSH connection
          sshpass -p 'testpassword' ssh -o StrictHostKeyChecking=no -p 2222 testuser@localhost echo "SSH connection successful"
      
      - name: Run local E2E tests
        run: bash ./misc/run_e2e_test.sh
      
      - name: Run SSH E2E tests
        run: bash ./misc/run_ssh_e2e_test.sh
        
      - name: Run Remote Config E2E tests
        run: |
          # Use GitHub Pages URL if available, otherwise use local server
          if [[ "$GITHUB_REPOSITORY" == "takutakahashi/operation-mcp" ]]; then
            # Replace the URL in the script with the GitHub Pages URL
            PAGES_URL="https://takutakahashi.github.io/operation-mcp/remote_config.yaml"
            sed -i "s|http://localhost:8080/remote_config.yaml|$PAGES_URL|g" ./misc/run_remote_config_e2e_test.sh
          fi
          bash ./misc/run_remote_config_e2e_test.sh
          
      - name: Run Param Ref E2E tests
        run: bash ./misc/run_param_ref_e2e_test.sh
        
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: operations-binary
          path: build/operations
