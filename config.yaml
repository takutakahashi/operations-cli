actions:
  - danger_level: high
    type: confirm
    params:
      message:
        description: "確認メッセージ"
        type: string
        required: true
        default: "This is a high danger operation. Proceed? (y/n): "
  - danger_level: medium
    type: timeout
    params:
      message:
        description: "タイムアウトメッセージ"
        type: string
        required: true
        default: "This is a medium danger operation. Proceeding in {{.timeout}} seconds."
      timeout:
        description: "タイムアウト秒数"
        type: integer
        required: true
        default: 5
  - danger_level: low
    type: force
    params:
      message:
        description: "メッセージ"
        type: string
        required: true
        default: "This is a low danger operation."

# 外部の設定ファイルをインポート
imports:
  - examples/imported-config.yaml
  # - /path/to/another/config.yaml  # 絶対パスでの指定も可能

tools:
  - name: alertmanager
    subtools:
      - name: get silences
        script: |
          curl -s -X GET http://localhost:9093/api/v2/silences
      - name: get alerts
        script: |
          curl -s -X GET http://localhost:9093/api/v2/alerts
  - name: kubectl
    command:
      - kubectl
    params:
      namespace:
        description: The namespace to run the command in
        type: string
        required: true
        validate:
          - danger_level: high
            exclude:
              - kube-system
              - kube-public
              - default
    subtools:
      - name: list namespace
        args: ["get", "namespace", "-o", "json"]
      - name: list pod
        args: ["get", "pod", "-o", "json", "-n", "{{.namespace}}"]
        params:
          namespace:
            description: The namespace to list
            type: string
            required: true
      - name: list node
        args: ["get", "node", "-o", "json"]
      - name: get node
        args: ["get", "node", "{{.node}}", "-o", "json"]
        params:
          node:
            description: The node to get
            type: string
            required: true
      - name: rollout restart deployment
        args: ["rollout", "restart", "deployment", "{{.deployment}}", "-n", "{{.namespace}}"]
        params:
          deployment:
            description: The deployment to restart
            type: string
            required: true
          namespace:
            description: The namespace to restart the deployment in
            type: string
            required: true  
      - name: list pod
        args: ["get", "pod", "-n", "{{.namespace}}", "-o", "json"]
        params:
          namespace:
            description: The namespace to list
            type: string
            required: true
      - name: describe pod
        args: ["describe", "pod", "{{.pod}}", "-n", "{{.namespace}}"]
        params:
          pod:
            description: The pod to describe
            type: string
            required: true
          namespace:
            description: The namespace of the pod
            type: string
            required: true
      - name: delete pod
        danger_level: high
        args: ["delete", "pod", "{{.pod}}", "-n", "{{.namespace}}"]
        params:
          pod:
            description: The pod to delete
            type: string
            required: true
          namespace:
            description: The namespace of the pod
            type: string
            required: true
